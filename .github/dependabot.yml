# Dependabot configuration for npm dependencies in selected subprojects.
# Regular dependency version updates are opened against the `alpha` branch,
# which is the active development branch and typically ahead of `main`.
# Security-related updates (triggered by CVEs/GitHub advisories) will always
# target the default branch (`main`), as this behavior cannot be overridden.
#
# Only the primary npm projects under /src are managed here; other package.json
# files are intentionally excluded. Semver-major updates are disabled to avoid
# breaking changes and are handled manually.

version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/src/etl"
      - "/src/scheduler"
      - "/src/gatsby"
      - "/src/cms"
    target-branch: "alpha"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "NOBUG"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

      # Sass > 1.32.13 adds excessive deprecation warnings
      # Upgrade intentionally when ready
      - dependency-name: "sass"

      # Cheerio > 1.0.0-rc.12 adds sqlite dependency via undici
      # see: https://github.com/cheeriojs/cheerio/issues/4747
      # 1.0.0-rc.12 has no known security advisories or issues impacting our gatsby project
      - dependency-name: "cheerio"

      # @strapi-community/provider-rest-cache-redis has an unlisted peer dependency
      # on @strapi-community/plugin-rest-cache
      - dependency-name: "@strapi-community/plugin-rest-cache"
    groups:
      bcparks-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/tools/imagetag-prune"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"

  # Explicitly cover root-level npm to prevent fallback PRs to main.
  # Version updates are intentionally disabled; all active Dependabot
  # usage happens on the alpha branch.
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
