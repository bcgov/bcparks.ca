# Dependabot configuration for npm dependencies in selected subprojects.
# Regular dependency version updates are opened against the `alpha` branch,
# which is the active development branch and typically ahead of `main`.
# Security-related updates (triggered by CVEs/GitHub advisories) will always
# target the default branch (`main`), as this behavior cannot be overridden.
#
# Only the primary npm projects under /src are managed here; other package.json
# files are intentionally excluded. Semver-major updates are disabled to avoid
# breaking changes and are handled manually. Security updates are not grouped so
# that each vulnerability results in a clearly visible, dedicated PR.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/src/etl"
    target-branch: "alpha"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "NOBUG"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      etl-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/src/scheduler"
    target-branch: "alpha"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "NOBUG"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      scheduler-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/src/gatsby"
    target-branch: "alpha"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "NOBUG"
    allow:
      - dependency-type: "direct"
    ignore:
      # Don’t allow major updates for anything
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

      # Sass > 1.32.13 adds excessive deprecation warnings
      # Upgrade intentionally when ready
      - dependency-name: "sass"
    groups:
      gatsby-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/src/cms"
    target-branch: "alpha"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "NOBUG"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

      # @strapi-community/provider-rest-cache-redis has an unlisted peer dependency 
      # on @strapi-community/plugin-rest-cache
      - dependency-name: "@strapi-community/plugin-rest-cache"
    groups:
      cms-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/tools/imagetag-prune"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"

  # Explicitly cover root-level npm to prevent fallback PRs to main.
  # Version updates are intentionally disabled; all active Dependabot
  # usage happens on the alpha branch.
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
